app = "sellpy-todos-manu"
primary_region = "arn"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  # SQLite is single-writer and lives on a volume attached to one machine.
  # Keep one machine running and never auto-stop — auto-stopping mid-request
  # would interrupt writes and cold-starts cost a connection.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/data"

[env]
  DB_PATH = "/data/todos.db"
